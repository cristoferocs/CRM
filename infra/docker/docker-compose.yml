# =============================================================================
# docker-compose.yml — Ambiente de desenvolvimento local
#
# Em PRODUÇÃO estes serviços são substituídos por:
#   - postgres → Neon DB (tier starter) ou Cloud SQL (tiers growth/enterprise)
#   - redis    → Upstash (tiers starter/growth) ou Memorystore (tier enterprise)
#
# Para iniciar: docker compose -f infra/docker/docker-compose.yml up -d
# =============================================================================

version: '3.9'

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: crm_api
    restart: unless-stopped
    ports:
      - '3333:3333'
    env_file:
      - ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://crm:crm_secret@postgres:5432/crm_base
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3333/health || exit 1' ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: crm_worker
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://crm:crm_secret@postgres:5432/crm_base
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Serviços de infraestrutura local
  # Em produção são substituídos pelos managed services do GCP (ver acima).
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_secret
      POSTGRES_DB: crm_base
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U crm -d crm_base' ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm_redis_prod
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
